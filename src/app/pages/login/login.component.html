<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 relative overflow-hidden">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-1/2 -right-1/2 w-96 h-96 bg-red-600 rounded-full mix-blend-multiply filter blur-3xl opacity-5"></div>
    <div class="absolute -bottom-1/2 -left-1/2 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-5"></div>
  </div>

  <div class="w-full max-w-md relative z-10 px-4">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl hover:border-white/20 transition-all duration-500">
      <div class="text-center mb-8">
        <h1 class="text-6xl font-black text-white mb-2 tracking-tight">MARVEL</h1>
        <p class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-pink-500 to-red-600 text-4xl font-black">RIVALS</p>
        <p class="text-slate-400 text-sm font-semibold uppercase tracking-widest mt-4">Inicia sesión para jugar</p>
      </div>

      <form (ngSubmit)="onLogin()" class="space-y-5">
        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">Email</label>
          <input
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            type="email"
            [class]="[
              'w-full px-4 py-3 bg-white/5 border text-white placeholder-slate-500',
              'rounded-lg focus:outline-none focus:ring-2 transition-all duration-300 backdrop-blur-sm',
              'border-white/10 focus:border-red-500/50 focus:ring-red-500/20',
              {'opacity-50 cursor-not-allowed': authService.isLoading()}
            ].join(' ')"
            placeholder="tu@email.com"
            [disabled]="authService.isLoading()"
          />
        </div>

        <div>
          <label class="block text-slate-300 text-sm font-semibold mb-2">Contraseña</label>
          <input
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            type="password"
            [class]="[
              'w-full px-4 py-3 bg-white/5 border text-white placeholder-slate-500',
              'rounded-lg focus:outline-none focus:ring-2 transition-all duration-300 backdrop-blur-sm',
              'border-white/10 focus:border-red-500/50 focus:ring-red-500/20',
              {'opacity-50 cursor-not-allowed': authService.isLoading()}
            ].join(' ')"
            placeholder="••••••••"
            [disabled]="authService.isLoading()"
          />
        </div>

        <button
          type="submit"
          [disabled]="!isFormValid() || authService.isLoading()"
          class="w-full mt-6 px-4 py-3 bg-gradient-to-r from-red-600 to-pink-600 hover:from-red-700 hover:to-pink-700 disabled:from-slate-700 disabled:to-slate-600 text-white font-bold text-lg uppercase tracking-wider rounded-lg transition-all duration-300 hover:scale-105 disabled:scale-100 disabled:cursor-not-allowed shadow-lg hover:shadow-red-500/50"
        >
          @if (!authService.isLoading()) {
            <span>Iniciar Sesión</span>
          } @else {
            <span class="inline-flex items-center gap-2">
              <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
              Cargando...
            </span>
          }
        </button>
      </form>

      @if (authService.error()) {
        <div class="mt-6 p-4 bg-red-500/10 border border-red-500/30 text-red-300 rounded-lg text-sm text-center font-medium">
          {{ authService.error() }}
        </div>
      }

      <div class="text-center mt-8 pt-6 border-t border-white/10">
        <p class="text-slate-400 text-sm font-medium">¿No tienes cuenta?</p>
        <a
          routerLink="/register"
          class="inline-block mt-3 text-red-500 hover:text-red-400 font-semibold uppercase tracking-wide transition-colors duration-300 text-sm"
        >
          Regístrate aquí →
        </a>
      </div>
    </div>
  </div>
</div>
